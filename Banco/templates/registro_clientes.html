{% extends 'formato.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2 class="mb-4"><i class="fas fa-user-plus"></i> Registrar Nuevo Cliente</h2>

            <div class="card">
                <div class="card-header">
                    <h5 class="mb-0">Información del Cliente</h5>
                </div>

                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label for="id_nombre" class="form-label">
                                <i class="fas fa-user"></i> Nombre Completo
                            </label>
                            {{ form.nombre }}
                        </div>

                        <div class="mb-3">
                            <label for="id_dpi" class="form-label">
                                <i class="fas fa-id-card"></i> DPI
                            </label>
                            {{ form.dpi }}
                        </div>

                        <div class="mb-4">
                            <label for="id_telefono" class="form-label">
                                <i class="fas fa-phone"></i> Teléfono
                            </label>
                            {{ form.telefono }}
                        </div>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <a href="{% url 'consultas' %}" class="btn btn-secondary">
                                <i class="fas fa-times"></i> Cancelar
                            </a>
                            <button type="submit" class="btn btn-success">
                                <i class="fas fa-check"></i> Guardar Cliente
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="mt-3 text-center text-muted">
                <small><i class="fas fa-lock"></i> Tus datos están seguros con nosotros</small>
            </div>
        </div>
    </div>
</div>

<style>
    #id_nombre, #id_dpi, #id_telefono {
        width: 100%;
        padding: 0.75rem;
        border: 2px solid #e9ecef;
        border-radius: 0.5rem;
        font-size: 1rem;
    }
    
    #id_nombre:focus, #id_dpi:focus, #id_telefono:focus {
        border-color: #2c5aa0;
        box-shadow: 0 0 0 0.2rem rgba(44, 90, 160, 0.25);
    }
</style>

{% endblock content %}
