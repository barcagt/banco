{% extends 'formato.html' %}

{% block content %}

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2 class="mb-4"><i class="fas fa-credit-card"></i> Registrar Nueva Cuenta</h2>

            <div class="card">
                <div class="card-header">
                    <h5 class="mb-0">Datos de la Cuenta</h5>
                </div>

                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label for="id_cliente" class="form-label">
                                <i class="fas fa-user"></i> Cliente
                            </label>
                            {{ form.cliente }}
                        </div>

                        <div class="mb-3">
                            <label for="id_numero_cuenta" class="form-label">
                                <i class="fas fa-hash"></i> Número de Cuenta
                            </label>
                            {{ form.numero_cuenta }}
                        </div>

                        <div class="mb-3">
                            <label for="id_tipo_cuenta" class="form-label">
                                <i class="fas fa-piggy-bank"></i> Tipo de Cuenta
                            </label>
                            {{ form.tipo_cuenta }}
                        </div>

                        <div class="mb-4">
                            <label for="id_saldo" class="form-label">
                                <i class="fas fa-money-bill"></i> Saldo Inicial
                            </label>
                            {{ form.saldo }}
                        </div>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <a href="{% url 'consultas' %}" class="btn btn-secondary">
                                <i class="fas fa-times"></i> Cancelar
                            </a>
                            <button type="submit" class="btn btn-success">
                                <i class="fas fa-check"></i> Guardar Cuenta
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="mt-3 text-center text-muted">
                <small><i class="fas fa-lock"></i> Tu cuenta está protegida con cifrado</small>
            </div>
        </div>
    </div>
</div>

<style>
    #id_cliente, #id_numero_cuenta, #id_tipo_cuenta, #id_saldo {
        width: 100%;
        padding: 0.75rem;
        border: 2px solid #e9ecef;
        border-radius: 0.5rem;
        font-size: 1rem;
    }
    
    #id_cliente:focus, #id_numero_cuenta:focus, #id_tipo_cuenta:focus, #id_saldo:focus {
        border-color: #2c5aa0;
        box-shadow: 0 0 0 0.2rem rgba(44, 90, 160, 0.25);
    }
</style>

{% endblock content %}
