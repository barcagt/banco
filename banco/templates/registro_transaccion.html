{% extends 'formato.html' %}

{% block content %}

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2 class="mb-4"><i class="fas fa-exchange-alt"></i> Registrar Transacción</h2>

            <div class="card">
                <div class="card-header">
                    <h5 class="mb-0">Datos de la Transacción</h5>
                </div>

                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label for="id_cuenta" class="form-label">
                                <i class="fas fa-wallet"></i> Cuenta
                            </label>
                            {{ form.cuenta }}
                        </div>

                        <div class="mb-3">
                            <label for="id_tipo" class="form-label">
                                <i class="fas fa-list"></i> Tipo de Transacción
                            </label>
                            {{ form.tipo }}
                        </div>

                        <div class="mb-3">
                            <label for="id_monto" class="form-label">
                                <i class="fas fa-money-bill"></i> Monto
                            </label>
                            <div class="input-group">
                                <span class="input-group-text">Q</span>
                                {{ form.monto }}
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="id_descripcion" class="form-label">
                                <i class="fas fa-align-left"></i> Descripción
                            </label>
                            {{ form.descripcion }}
                        </div>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <a href="{% url 'consultas' %}" class="btn btn-secondary">
                                <i class="fas fa-times"></i> Cancelar
                            </a>
                            <button type="submit" class="btn btn-warning">
                                <i class="fas fa-check"></i> Registrar Transacción
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="mt-3 text-center text-muted">
                <small><i class="fas fa-check-double"></i> Transacciones verificadas automáticamente</small>
            </div>
        </div>
    </div>
</div>

<style>
    #id_cuenta, #id_tipo, #id_monto, #id_descripcion {
        width: 100%;
        padding: 0.75rem;
        border: 2px solid #e9ecef;
        border-radius: 0.5rem;
        font-size: 1rem;
    }
    
    #id_cuenta:focus, #id_tipo:focus, #id_monto:focus, #id_descripcion:focus {
        border-color: #2c5aa0;
        box-shadow: 0 0 0 0.2rem rgba(44, 90, 160, 0.25);
    }
    
    .input-group #id_monto {
        border-radius: 0;
    }
</style>

{% endblock content %}
